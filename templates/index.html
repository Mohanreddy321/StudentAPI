{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<div class="container">

    <!-- Header -->
    <header class="header">

        <div>
            <h1>🎓 Student Management System</h1>
            <p class="subtitle">Secure Student Records Dashboard</p>
        </div>

        <button class="logout-btn" onclick="logoutUser()">
            Logout
        </button>

    </header>

    <!-- Form Section -->
    <div class="card">

        <div class="card-title">
            <h2>Add / Update Student</h2>
        </div>

        <div id="message"></div>

        <div class="form-grid">

            <div class="form-group">
                <label>Student Name</label>
                <input
                    type="text"
                    id="name"
                    placeholder="Enter Student Name">
            </div>

            <div class="form-group">
                <label>Age</label>
                <input
                    type="number"
                    id="age"
                    placeholder="Enter Age">
            </div>

            <div class="form-group">
                <label>Course</label>
                <input
                    type="text"
                    id="course"
                    placeholder="Enter Course">
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input
                    type="email"
                    id="email"
                    placeholder="Enter Email Address">
            </div>

        </div>

        <div class="button-area">

            <button
                id="addBtn"
                class="primary-btn"
                onclick="addStudent()">

                ➕ Add Student

            </button>

            <button
                class="secondary-btn"
                onclick="clearForm()">

                Reset

            </button>

        </div>

    </div>

    <!-- Table Section -->
    <div class="card">

        <div class="table-header">

            <h2>Student Records</h2>

            <span id="studentCount"></span>

        </div>

        <div class="table-responsive">

            <table>

                <thead>

                    <tr>

                        <th>ID</th>

                        <th>Name</th>

                        <th>Age</th>

                        <th>Course</th>

                        <th>Email</th>

                        <th>Actions</th>

                    </tr>

                </thead>

                <tbody id="studentTable">

                </tbody>

            </table>

        </div>

    </div>

    <footer>

        <p>
            © 2026 Student Management System | Developed using Django REST Framework
        </p>

    </footer>

</div>

<script src="{% static 'js/script.js' %}"></script>

</body>

</html>
